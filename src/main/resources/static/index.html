<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker Pro</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #667eea, #764ba2, #00c6ff, #ff6a00);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% }
            50% { background-position: 100% }
            100% { background-position: 0% }
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin-top: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        input, select {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #00c6ff;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #0072ff;
        }

        .danger { background: #ff4b5c; }
        .danger:hover { background: #c0392b; }

        .expense {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
        }

        #total {
            font-size: 24px;
            color: #00ffcc;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: black;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>

<body>

<h1>💰 Expense Tracker PRO</h1>

<div class="container">

    <!-- ADD -->
    <div class="card">
        <h3>Add Expense</h3>

        <input type="number" id="amount" placeholder="Amount">

        <select id="category">
            <option value="">Category</option>
            <option>Food</option>
            <option>Travel</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Entertainment</option>
        </select>

        <input type="text" id="description" placeholder="Description">
        <input type="date" id="date">

        <button onclick="addExpense()">➕ Add</button>
    </div>

    <!-- CONTROL PANEL -->
    <div class="card">
        <h3>Controls</h3>

        <button onclick="fetchExpenses()">🔄 Get All</button>
        <button onclick="getTotal()">💰 Total</button>
        <button onclick="deleteAll()" class="danger">🗑 Delete All</button>

        <br>

        <input type="text" id="search" placeholder="Search description">
        <button onclick="searchExpenses()">🔍 Search</button>

        <select id="filter" onchange="fetchExpenses()">
            <option value="">All</option>
            <option>Food</option>
            <option>Travel</option>
            <option>Shopping</option>
            <option>Bills</option>
        </select>
    </div>

    <!-- TOTAL -->
    <div class="card">
        <h3>Total: ₹ <span id="total">0</span></h3>
    </div>

    <!-- LIST -->
    <div class="card">
        <h3>Expenses</h3>
        <div id="list"></div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>

const API = "/expenses";

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2000);
}

async function addExpense() {

    const amount = document.getElementById("amount").value;
    const category = document.getElementById("category").value;
    const date = document.getElementById("date").value;

    if (!amount || !category || !date) {
        showToast("Fill required fields");
        return;
    }

    await fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: parseFloat(amount),
            category,
            description: document.getElementById("description").value,
            date
        })
    });

    showToast("Added!");
    fetchExpenses();
}

async function fetchExpenses() {

    const category = document.getElementById("filter").value;
    let url = API;

    if (category) url += "?category=" + category;

    const res = await fetch(url);
    const data = await res.json();

    render(data);
}

function render(data) {

    const list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;

    data.forEach(e => {

        total += e.amount;

        const div = document.createElement("div");
        div.className = "expense";

        div.innerHTML = `
            <span>₹${e.amount} | ${e.category} | ${e.date}</span>
            <button class="danger" onclick="deleteExpense(${e.id})">Delete</button>
        `;

        list.appendChild(div);
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

async function deleteExpense(id) {
    await fetch(API + "/" + id, { method: "DELETE" });
    showToast("Deleted");
    fetchExpenses();
}

async function deleteAll() {

    if (!confirm("Delete ALL data?")) return;

    await fetch(API + "/all", { method: "DELETE" });
    showToast("All deleted");
    fetchExpenses();
}

async function getTotal() {

    const res = await fetch(API + "/total");
    const total = await res.json();

    document.getElementById("total").innerText = total;
}

async function searchExpenses() {

    const keyword = document.getElementById("search").value;

    const res = await fetch(API + "/search?keyword=" + keyword);
    const data = await res.json();

    render(data);
}

fetchExpenses();

</script>

</body>
</html>
